name: Release

# Hands-free release: push a version tag (e.g. v0.1.5) and this builds, publishes to PyPI
# via Trusted Publishing (OIDC — no stored token), then registers the new version on the
# official MCP registry via GitHub OIDC (no device tap, no JWT expiry). Eliminates the manual
# twine-upload + mcp-publisher device-login that we did by hand for 0.1.0–0.1.4.
#
# ONE-TIME SETUP (PyPI side, done once via the web UI):
#   pypi.org -> chain-signer -> Publishing -> add a Trusted Publisher:
#     Owner: Kevthetech143 | Repo: chain-signer | Workflow: release.yml | Environment: pypi
#   (No PyPI token needed after that.)
# Also: the GitHub org/user membership for the io.github.Kevthetech143 namespace must be public.

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Build + publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set package version from the tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          echo "building version $VERSION"
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # a re-run of an existing version is a no-op, not a hard failure

  mcp-registry:
    name: Register on the official MCP registry
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true   # registry is still preview — never let it block a real release
    permissions:
      id-token: write   # MCP registry GitHub OIDC
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Sync server.json version to the tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v | (.packages[].version) = $v' server.json > "$tmp" && mv "$tmp" server.json
          echo "server.json now at $VERSION"
      - name: Download MCP Publisher
        run: |
          asset="mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz"
          curl -fL "https://github.com/modelcontextprotocol/registry/releases/latest/download/${asset}" | tar xz mcp-publisher
          ./mcp-publisher --version || true
      - name: Publish to MCP registry (OIDC)
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
