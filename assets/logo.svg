<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- chain-signer logo: shield = guarding; pen-stroke chain link = the signing surface -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1726"/>
      <stop offset="1" stop-color="#101f33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34e0b0"/>
      <stop offset="1" stop-color="#1fb98f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- shield -->
  <path d="M256 84 L396 132 V268 C396 352 332 406 256 432 C180 406 116 352 116 268 V132 Z"
        fill="none" stroke="url(#accent)" stroke-width="22" stroke-linejoin="round"/>
  <!-- chain link rotated as a signature stroke -->
  <g transform="rotate(-35 256 262)">
    <rect x="166" y="232" width="110" height="60" rx="30" fill="none" stroke="#e8f6f0" stroke-width="20"/>
    <rect x="236" y="232" width="110" height="60" rx="30" fill="none" stroke="url(#accent)" stroke-width="20"/>
  </g>
  <!-- signature baseline tick -->
  <path d="M170 360 q40 18 86 6 t96 -10" fill="none" stroke="#e8f6f0" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
</svg>
